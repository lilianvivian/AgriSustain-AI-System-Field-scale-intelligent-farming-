<!DOCTYPE html>
<html>
<head>
    <title>AgriSustain AI</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
        }

        input {
            margin: 20px 0;
        }

        button {
            background: green;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🌱 AgriSustain AI</h2>
    <p>Upload a plant leaf image</p>

    <input type="file" id="fileInput">
    <br>
    <button onclick="uploadImage()">Predict</button>

    <div id="result"></div>
</div>

<script>
async function uploadImage() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("/predict", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    document.getElementById("result").innerHTML =
        "Prediction: " + data.class +
        "<br>Confidence: " + (data.confidence * 100).toFixed(2) + "%";
}
</script>

</body>
</html>
